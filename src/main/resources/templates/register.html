<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Product CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-1">Daftar Akun</h3>
                    <p class="text-center text-muted mb-4 small">Buat akun untuk mulai mengelola produk</p>

                    <!-- Error message -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">

                        <!-- Nama Lengkap (opsional) -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">
                                Nama Lengkap
                                <span class="text-muted small">(opsional)</span>
                            </label>
                            <input type="text" class="form-control" id="fullName"
                                   th:field="*{fullName}" placeholder="Masukkan nama lengkap">
                        </div>

                        <!-- Email (opsional) -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                Email
                                <span class="text-muted small">(opsional)</span>
                            </label>
                            <input type="email" class="form-control" id="email"
                                   th:field="*{email}" placeholder="Masukkan alamat email">
                        </div>

                        <hr class="my-3">

                        <!-- Username (wajib) -->
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                Username <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="username"
                                   th:field="*{username}" placeholder="Masukkan username" required autofocus>
                        </div>

                        <!-- Password (wajib) -->
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="password"
                                   th:field="*{password}" placeholder="Masukkan password" required>
                        </div>

                        <!-- Konfirmasi Password (wajib) -->
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">
                                Konfirmasi Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   th:field="*{confirmPassword}" placeholder="Ulangi password" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-bold">
                            <i class="bi bi-person-plus me-1"></i>Daftar
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <span>Sudah punya akun? </span>
                        <a th:href="@{/login}">Login di sini</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
