<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- Flash message sukses -->
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">Profil Pengguna</h4>
                    <a th:href="@{/profile/edit}" class="btn btn-light btn-sm">Edit Profil</a>
                </div>
                <div class="card-body">
                    <div class="row">
                        <!-- Foto Profil -->
                        <div class="col-md-3 text-center mb-4 mb-md-0">
                            <div th:if="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}">
                                <img th:src="${user.profileImageUrl}"
                                     alt="Foto Profil"
                                     class="rounded-circle border shadow-sm"
                                     style="width: 120px; height: 120px; object-fit: cover;">
                            </div>
                            <div th:unless="${user.profileImageUrl != null and !#strings.isEmpty(user.profileImageUrl)}"
                                 class="rounded-circle bg-secondary d-flex align-items-center justify-content-center mx-auto text-white fw-bold fs-2"
                                 style="width: 120px; height: 120px;">
                                <span th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">U</span>
                            </div>
                            <p class="mt-2 fw-bold text-primary mb-0" th:text="${user.username}"></p>
                        </div>

                        <!-- Info Profil -->
                        <div class="col-md-9">
                            <table class="table table-borderless mb-0">
                                <tr>
                                    <th class="text-muted" style="width: 150px;">Username</th>
                                    <td th:text="${user.username}">-</td>
                                </tr>
                                <tr>
                                    <th class="text-muted">Nama Lengkap</th>
                                    <td>
                                        <span th:if="${user.fullName != null and !#strings.isEmpty(user.fullName)}"
                                              th:text="${user.fullName}"></span>
                                        <span th:unless="${user.fullName != null and !#strings.isEmpty(user.fullName)}"
                                              class="text-muted fst-italic">Belum diisi</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="text-muted">Email</th>
                                    <td>
                                        <span th:if="${user.email != null and !#strings.isEmpty(user.email)}"
                                              th:text="${user.email}"></span>
                                        <span th:unless="${user.email != null and !#strings.isEmpty(user.email)}"
                                              class="text-muted fst-italic">Belum diisi</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="text-muted">No. HP</th>
                                    <td>
                                        <span th:if="${user.phoneNumber != null and !#strings.isEmpty(user.phoneNumber)}"
                                              th:text="${user.phoneNumber}"></span>
                                        <span th:unless="${user.phoneNumber != null and !#strings.isEmpty(user.phoneNumber)}"
                                              class="text-muted fst-italic">Belum diisi</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="text-muted">Alamat</th>
                                    <td>
                                        <span th:if="${user.address != null and !#strings.isEmpty(user.address)}"
                                              th:text="${user.address}"></span>
                                        <span th:unless="${user.address != null and !#strings.isEmpty(user.address)}"
                                              class="text-muted fst-italic">Belum diisi</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th class="text-muted">Bio</th>
                                    <td>
                                        <span th:if="${user.bio != null and !#strings.isEmpty(user.bio)}"
                                              th:text="${user.bio}"></span>
                                        <span th:unless="${user.bio != null and !#strings.isEmpty(user.bio)}"
                                              class="text-muted fst-italic">Belum diisi</span>
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-light d-flex gap-2">
                    <a th:href="@{/profile/edit}" class="btn btn-warning btn-sm">Edit Profil</a>
                    <a th:href="@{/profile/change-password}" class="btn btn-outline-secondary btn-sm">Ganti Password</a>
                    <a th:href="@{/products}" class="btn btn-outline-primary btn-sm ms-auto">Ke Produk</a>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
