<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Kategori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Inventory App</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Produk</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/categories}">Kategori</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Daftar Kategori</h2>
        <a th:href="@{/categories/new}" class="btn btn-success">+ Tambah Kategori</a>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/categories}" method="get" class="row g-2 align-items-center">
                <div class="col-auto">
                    <label for="keyword" class="col-form-label fw-bold">Cari Kategori:</label>
                </div>
                <div class="col-auto">
                    <input type="text" id="keyword" name="keyword" th:value="${keyword}" class="form-control" placeholder="Ketik nama kategori...">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Filter</button>
                    <a th:href="@{/categories}" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark">
                <tr>
                    <th width="5%">No</th>
                    <th width="20%">Nama Kategori</th>
                    <th width="30%">Deskripsi</th>
                    <th width="30%">Daftar Produk</th>
                    <th width="15%" class="text-center">Aksi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cat, iterStat : ${categories}">
                    <td th:text="${iterStat.count}">1</td>
                    <td class="fw-bold text-primary" th:text="${cat.name}"></td>
                    <td th:text="${cat.description}"></td>

                    <td>
                        <div th:if="${not #lists.isEmpty(cat.products)}">
                                <span th:each="prod : ${cat.products}"
                                      class="badge bg-info text-dark me-1 mb-1"
                                      th:text="${prod.name}">
                                </span>
                        </div>
                        <small th:if="${#lists.isEmpty(cat.products)}" class="text-muted">
                            <em>Kosong</em>
                        </small>
                    </td>

                    <td class="text-center">
                        <div class="btn-group" role="group">
                            <a th:href="@{/categories/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-warning">Edit</a>
                            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                                  onsubmit="return confirm('Yakin ingin menghapus kategori ini? SEMUA PRODUK DI DALAMNYA JUGA AKAN TERHAPUS!');" style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-danger">Hapus</button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${categories.empty}">
                    <td colspan="5" class="text-center text-muted py-4">Data kategori tidak ditemukan.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
