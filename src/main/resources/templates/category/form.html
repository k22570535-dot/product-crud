<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <title th:text="${categoryId == null ? 'Tambah Kategori' : 'Edit Kategori'}">Form Kategori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${categoryId == null ? 'Tambah Kategori Baru' : 'Edit Kategori'}"></h4>
                </div>
                <div class="card-body">

                    <div th:if="${#fields.hasErrors('categoryRequest.*')}" class="alert alert-danger">
                        Mohon periksa kembali isian form Anda.
                    </div>

                    <form th:action="${categoryId == null ? '/categories/save' : '/categories/' + categoryId + '/update'}"
                          th:object="${categoryRequest}"
                          method="post">

                        <div class="mb-3">
                            <label for="name" class="form-label text-dark fw-bold">Nama Kategori <span class="text-danger">*</span></label>
                            <input type="text" id="name" th:field="*{name}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                   placeholder="Contoh: Elektronik, Pakaian, dll">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label text-dark fw-bold">Deskripsi</label>
                            <textarea id="description" th:field="*{description}"
                                      class="form-control" rows="3"
                                      placeholder="Penjelasan singkat tentang kategori ini..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/categories}" class="btn btn-secondary">Batal</a>
                            <button type="submit" class="btn btn-primary">Simpan Kategori</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
