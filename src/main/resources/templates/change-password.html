<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ganti Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    keyframes: {
                        fadeUp:  { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn:  { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        shake:   { '0%,100%': { transform: 'translateX(0)' }, '20%,60%': { transform: 'translateX(-6px)' }, '40%,80%': { transform: 'translateX(6px)' } },
                    },
                    animation: {
                        'fade-up':   'fadeUp 0.5s ease both',
                        'fade-up-2': 'fadeUp 0.5s 0.08s ease both',
                        'fade-up-3': 'fadeUp 0.5s 0.16s ease both',
                        'fade-up-4': 'fadeUp 0.5s 0.24s ease both',
                        'fade-up-5': 'fadeUp 0.5s 0.32s ease both',
                        'fade-in':   'fadeIn 0.4s ease both',
                        'shake':     'shake 0.4s ease both',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* floating label effect */
        .input-group { position: relative; }
        .input-field {
            width: 100%;
            padding: 0.875rem 2.75rem 0.875rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 0.875rem;
            font-size: 0.9rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            border-color: #f59e0b;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
        }
        .input-field.error {
            border-color: #ef4444;
            background: #fff5f5;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
        }

        /* strength bar */
        .strength-bar { height: 4px; border-radius: 2px; transition: width 0.4s ease, background 0.4s ease; }

        /* eye toggle button */
        .eye-btn {
            position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
            color: #94a3b8; cursor: pointer; padding: 2px;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #475569; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- Background decoration -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-32 -right-32 w-96 h-96 bg-amber-100 rounded-full opacity-40 blur-3xl"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-blue-100 rounded-full opacity-30 blur-3xl"></div>
</div>

<main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

        <!-- Back link -->
        <a th:href="@{/profile}"
           class="animate-fade-up inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-700 mb-6 transition-colors group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
            </svg>
            Kembali ke Profil
        </a>

        <!-- Card -->
        <div class="animate-fade-up-2 bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden">

            <!-- Card Header -->
            <div class="relative bg-gradient-to-br from-amber-400 to-amber-500 px-8 py-7">
                <!-- Decorative circles -->
                <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
                <div class="absolute bottom-0 left-0 w-20 h-20 bg-black/5 rounded-full translate-y-1/2 -translate-x-1/2"></div>

                <div class="relative flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center shadow-inner">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-white tracking-tight">Ganti Password</h1>
                        <p class="text-amber-100 text-sm mt-0.5">Perbarui keamanan akun kamu</p>
                    </div>
                </div>
            </div>

            <!-- Card Body -->
            <div class="px-8 py-7">

                <!-- Flash message error -->
                <div th:if="${error}"
                     class="animate-shake mb-5 flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-2xl px-4 py-3.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mt-0.5 shrink-0 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                    </svg>
                    <span class="text-sm font-medium" th:text="${error}">Pesan error</span>
                </div>

                <!-- Flash message sukses -->
                <div th:if="${success}"
                     class="animate-fade-in mb-5 flex items-start gap-3 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-2xl px-4 py-3.5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mt-0.5 shrink-0 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span class="text-sm font-medium" th:text="${success}">Password berhasil diubah!</span>
                </div>

                <!-- Form -->
                <form th:action="@{/profile/change-password}"
                      th:object="${changePasswordRequest}"
                      method="post"
                      class="space-y-5"
                      id="changePasswordForm">

                    <!-- Password Lama -->
                    <div class="animate-fade-up-3">
                        <label for="oldPassword" class="block text-sm font-semibold text-slate-700 mb-1.5">
                            Password Lama
                        </label>
                        <div class="input-group">
                            <input type="password"
                                   id="oldPassword"
                                   th:field="*{oldPassword}"
                                   class="input-field"
                                   placeholder="Masukkan password lama"
                                   required/>
                            <button type="button" class="eye-btn" onclick="togglePassword('oldPassword', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Divider -->
                    <div class="animate-fade-up-3 border-t border-dashed border-slate-200 my-1"></div>

                    <!-- Password Baru -->
                    <div class="animate-fade-up-4">
                        <label for="newPassword" class="block text-sm font-semibold text-slate-700 mb-1.5">
                            Password Baru
                        </label>
                        <div class="input-group">
                            <input type="password"
                                   id="newPassword"
                                   th:field="*{newPassword}"
                                   class="input-field"
                                   placeholder="Minimal 8 karakter"
                                   required
                                   oninput="checkStrength(this.value); checkMatch()"/>
                            <button type="button" class="eye-btn" onclick="togglePassword('newPassword', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>

                        <!-- Password strength bar -->
                        <div class="mt-2 space-y-1" id="strengthWrap" style="display:none">
                            <div class="flex gap-1">
                                <div class="h-1.5 flex-1 rounded-full bg-slate-100 overflow-hidden">
                                    <div id="bar1" class="h-full rounded-full transition-all duration-300 w-0"></div>
                                </div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-100 overflow-hidden">
                                    <div id="bar2" class="h-full rounded-full transition-all duration-300 w-0"></div>
                                </div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-100 overflow-hidden">
                                    <div id="bar3" class="h-full rounded-full transition-all duration-300 w-0"></div>
                                </div>
                                <div class="h-1.5 flex-1 rounded-full bg-slate-100 overflow-hidden">
                                    <div id="bar4" class="h-full rounded-full transition-all duration-300 w-0"></div>
                                </div>
                            </div>
                            <p id="strengthLabel" class="text-xs font-medium text-slate-400"></p>
                        </div>
                    </div>

                    <!-- Konfirmasi Password Baru -->
                    <div class="animate-fade-up-5">
                        <label for="confirmNewPassword" class="block text-sm font-semibold text-slate-700 mb-1.5">
                            Konfirmasi Password Baru
                        </label>
                        <div class="input-group">
                            <input type="password"
                                   id="confirmNewPassword"
                                   th:field="*{confirmNewPassword}"
                                   class="input-field"
                                   placeholder="Ulangi password baru"
                                   required
                                   oninput="checkMatch()"/>
                            <button type="button" class="eye-btn" onclick="togglePassword('confirmNewPassword', this)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                            </button>
                        </div>
                        <!-- Match hint -->
                        <p id="matchHint" class="mt-1.5 text-xs font-medium hidden"></p>
                    </div>

                    <!-- Info BCrypt -->
                    <div class="animate-fade-up-5 flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                        <span class="text-xs text-slate-500">Password dienkripsi dengan <span class="font-semibold text-slate-600">BCrypt</span> sebelum disimpan</span>
                    </div>

                    <!-- Buttons -->
                    <div class="animate-fade-up-5 flex flex-col gap-2.5 pt-1">
                        <button type="submit"
                                class="w-full py-3 bg-amber-400 hover:bg-amber-500 active:scale-[0.98] text-white font-bold text-sm rounded-2xl
                                       transition-all shadow-md shadow-amber-200 hover:shadow-amber-300">
                            Simpan Password Baru
                        </button>
                        <a th:href="@{/profile}"
                           class="w-full py-3 text-center bg-slate-100 hover:bg-slate-200 active:scale-[0.98] text-slate-600 font-semibold text-sm rounded-2xl transition-all">
                            Batal
                        </a>
                    </div>

                </form>
            </div>
        </div>

        <!-- Footer note -->
        <p class="animate-fade-up-5 text-center text-xs text-slate-400 mt-5">
            Lupa password lama?
            <a href="#" class="text-amber-500 hover:text-amber-600 font-semibold transition-colors">Hubungi admin</a>
        </p>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    /* ── Toggle show/hide password ── */
    function togglePassword(id, btn) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.style.color = isText ? '' : '#f59e0b';
    }

    /* ── Password strength indicator ── */
    function checkStrength(val) {
        const wrap = document.getElementById('strengthWrap');
        const label = document.getElementById('strengthLabel');
        const bars = ['bar1','bar2','bar3','bar4'].map(id => document.getElementById(id));

        if (!val) { wrap.style.display = 'none'; return; }
        wrap.style.display = 'block';

        let score = 0;
        if (val.length >= 8)            score++;
        if (/[A-Z]/.test(val))          score++;
        if (/[0-9]/.test(val))          score++;
        if (/[^A-Za-z0-9]/.test(val))   score++;

        const configs = [
            { color: 'bg-red-400',    text: 'Lemah',        textColor: 'text-red-400' },
            { color: 'bg-orange-400', text: 'Cukup',        textColor: 'text-orange-400' },
            { color: 'bg-amber-400',  text: 'Baik',         textColor: 'text-amber-500' },
            { color: 'bg-emerald-400',text: 'Sangat Kuat',  textColor: 'text-emerald-500' },
        ];
        const cfg = configs[score - 1] || configs[0];

        bars.forEach((bar, i) => {
            bar.className = `h-full rounded-full transition-all duration-300 ${i < score ? cfg.color : ''}`;
            bar.style.width = i < score ? '100%' : '0%';
        });

        label.className = `text-xs font-medium ${cfg.textColor}`;
        label.textContent = cfg.text;
    }

    /* ── Password match check ── */
    function checkMatch() {
        const np  = document.getElementById('newPassword').value;
        const cnp = document.getElementById('confirmNewPassword').value;
        const hint = document.getElementById('matchHint');

        if (!cnp) { hint.classList.add('hidden'); return; }

        hint.classList.remove('hidden');
        if (np === cnp) {
            hint.textContent = '✓ Password cocok';
            hint.className = 'mt-1.5 text-xs font-medium text-emerald-500';
            document.getElementById('confirmNewPassword').classList.remove('error');
        } else {
            hint.textContent = '✗ Password tidak cocok';
            hint.className = 'mt-1.5 text-xs font-medium text-red-400';
            document.getElementById('confirmNewPassword').classList.add('error');
        }
    }
</script>

</body>
</html>
