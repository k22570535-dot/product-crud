<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <!-- Flash message error -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Ganti Password</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" th:object="${changePasswordRequest}" method="post">

                        <!-- Password Lama -->
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label fw-semibold">Password Lama</label>
                            <input type="password"
                                   id="oldPassword"
                                   th:field="*{oldPassword}"
                                   class="form-control"
                                   placeholder="Masukkan password lama"
                                   required>
                        </div>

                        <!-- Password Baru -->
                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-semibold">Password Baru</label>
                            <input type="password"
                                   id="newPassword"
                                   th:field="*{newPassword}"
                                   class="form-control"
                                   placeholder="Masukkan password baru"
                                   required>
                        </div>

                        <!-- Konfirmasi Password Baru -->
                        <div class="mb-4">
                            <label for="confirmNewPassword" class="form-label fw-semibold">Konfirmasi Password Baru</label>
                            <input type="password"
                                   id="confirmNewPassword"
                                   th:field="*{confirmNewPassword}"
                                   class="form-control"
                                   placeholder="Ulangi password baru"
                                   required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-bold">Simpan Password Baru</button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">Batal</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
