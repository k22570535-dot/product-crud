<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Edit Profil</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/profile/edit}" th:object="${editProfileRequest}" method="post">

                        <!-- Username (read-only, tidak dikirim ke server) -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted">Username</label>
                            <input type="text" class="form-control bg-light"
                                   th:value="${username}" readonly>
                            <div class="form-text">Username tidak dapat diubah.</div>
                        </div>

                        <!-- Nama Lengkap -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text"
                                   id="fullName"
                                   th:field="*{fullName}"
                                   class="form-control"
                                   placeholder="Masukkan nama lengkap">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Email</label>
                            <input type="email"
                                   id="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   placeholder="Masukkan alamat email">
                        </div>

                        <!-- Nomor HP -->
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label fw-semibold">Nomor HP</label>
                            <input type="text"
                                   id="phoneNumber"
                                   th:field="*{phoneNumber}"
                                   class="form-control"
                                   placeholder="Masukkan nomor HP">
                        </div>

                        <!-- Alamat -->
                        <div class="mb-3">
                            <label for="address" class="form-label fw-semibold">Alamat</label>
                            <textarea id="address"
                                      th:field="*{address}"
                                      class="form-control"
                                      rows="2"
                                      placeholder="Masukkan alamat lengkap"></textarea>
                        </div>

                        <!-- Bio -->
                        <div class="mb-3">
                            <label for="bio" class="form-label fw-semibold">Bio</label>
                            <textarea id="bio"
                                      th:field="*{bio}"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Ceritakan sedikit tentang diri Anda..."></textarea>
                        </div>

                        <!-- URL Foto Profil -->
                        <div class="mb-4">
                            <label for="profileImageUrl" class="form-label fw-semibold">URL Foto Profil</label>
                            <input type="url"
                                   id="profileImageUrl"
                                   th:field="*{profileImageUrl}"
                                   class="form-control"
                                   placeholder="https://example.com/foto.jpg">
                            <div class="form-text">Masukkan URL gambar untuk foto profil Anda (opsional).</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning fw-bold">Simpan Perubahan</button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">Batal</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
